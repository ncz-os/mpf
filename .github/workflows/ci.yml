name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema ruff
      - name: Lint
        run: ruff check .
      - name: Validate JSON Schema is well-formed
        run: |
          python -c "import json; json.load(open('schema/mpf-v0.1.json'))"
      - name: Validate every vector against schema
        run: |
          for v in vectors/*.json; do
            echo "=== $v ==="
            python validate.py --file "$v"
          done
